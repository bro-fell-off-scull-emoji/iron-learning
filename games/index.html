<!-- TOP BAR (when in game) -->
<div id="topBar">
  <button id="backBtn" onclick="goBack()">⬅</button>
  <button onclick="goFullscreen()">⛶</button>
  <button onclick="reloadGame()">⟳</button>

</div>

<!-- GAME -->
<iframe id="gameFrame"></iframe>

<script>

  document.getElementById("menu").style.display = "none";
  document.getElementById("topBar").style.display = "block";
  document.getElementById("gameFrame").style.display = "block";
  document.getElementById("gameFrame").src = url;


function goBack() {
  document.getElementById("gameFrame").src = "";
  document.getElementById("gameFrame").style.display = "none";
  document.getElementById("topBar").style.display = "none";
  document.getElementById("menu").style.display = "block";
}

async function openBlob() {
  if (!currentGame) return;

  try {
    const res = await fetch(currentGame);
    const text = await res.text();

    const blob = new Blob([text], { type: "text/html" });
    const blobUrl = URL.createObjectURL(blob);

    document.getElementById("gameFrame").src = blobUrl;
  } catch {
    alert("Blob failed");
  }
}
</script>

</html>
<body>
<script>
let currentGame = "";

function startGame(url) {
  currentGame = url;

  // hide menu
  document.getElementById("menu").style.display = "none";

  // show game + top bar
  document.getElementById("topBar").style.display = "block";
  document.getElementById("gameFrame").style.display = "block";

  document.getElementById("gameFrame").src = url;
}

function goBack() {
  const frame = document.getElementById("gameFrame");

  frame.style.display = "none";
  frame.src = "";

  document.getElementById("topBar").style.display = "none";
  document.getElementById("menu").style.display = "block";
}


function searchGames() {
  const input = document.getElementById("searchBar").value.toLowerCase();
  const buttons = document.getElementsByClassName("gameBtn");

  for (let i = 0; i < buttons.length; i++) {
    const text = buttons[i].innerText.toLowerCase();

    if (text.includes(input)) {
      buttons[i].style.display = "block";
    } else {
      buttons[i].style.display = "none";
    }
  }
}
  document.getElementById("menu").style.display = "none";
  document.getElementById("topBar").style.display = "flex";

  const frame = document.getElementById("gameFrame");
  frame.style.display = "block";
  frame.src = url;


function goBack() {
  const frame = document.getElementById("gameFrame");

  frame.style.display = "none";
  frame.src = "";

  document.getElementById("topBar").style.display = "none";
  document.getElementById("menu").style.display = "flex";
}

function goFullscreen() {
  const frame = document.getElementById("gameFrame");

  if (frame.requestFullscreen) {
    frame.requestFullscreen();
  }
}

function reloadGame() {
  const frame = document.getElementById("gameFrame");
  frame.src = frame.src;
}
</script>
 

</body>
</html>
