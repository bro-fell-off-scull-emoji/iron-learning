<!DOCTYPE html>
<html>
<head>
  <title>Games</title>
<link rel="stylesheet" href="style.css">
<style>
#menu {
  display: block;
}

#topBar {
  height: 50px;
  position: fixed;
  top: 0;
  width: 100%;
  z-index: 10;
}

 #gameFrame {
  position: fixed;
  top: 50px;   /* space for top bar */
  left: 0;
  width: 100vw;
  height: calc(100vh - 50px);
  border: none;
  display: none;
}
</style>
  
 <div id="menu">
  <button class="gameBtn" onclick="startGame('adofai/index.html')">A Dance of Fire and Ice</button>
  <button class="gameBtn" onclick="startGame('adventurecapital/index.html')">Adventure Capitalist</button>
</div>

<!-- TOP BAR (when in game) -->
<div id="topBar">
  <button id="backBtn" onclick="goBack()">⬅</button>
</div>

<!-- GAME -->
<iframe id="gameFrame"></iframe>

<script>

  document.getElementById("menu").style.display = "none";
  document.getElementById("topBar").style.display = "block";
  document.getElementById("gameFrame").style.display = "block";
  document.getElementById("gameFrame").src = url;


function goBack() {
  document.getElementById("gameFrame").src = "";
  document.getElementById("gameFrame").style.display = "none";
  document.getElementById("topBar").style.display = "none";
  document.getElementById("menu").style.display = "block";
}

</script>

</body>
</html>
<script>
let currentGame = "";

function startGame(url) {
  currentGame = url;

  // hide menu
  document.getElementById("menu").style.display = "none";

  // show game + top bar
  document.getElementById("topBar").style.display = "block";
  document.getElementById("gameFrame").style.display = "block";

  document.getElementById("gameFrame").src = url;
}

function goBack() {
  const frame = document.getElementById("gameFrame");

  frame.style.display = "none";
  frame.src = "";

  document.getElementById("topBar").style.display = "none";
  document.getElementById("menu").style.display = "block";
}
</script>
 

</body>
</html>
