<!DOCTYPE html>
<html>
<head>
  <title>Games</title>
<link rel="stylesheet" href="style.css">
  
 <div id="menu">
  <button class="gameBtn" onclick="startGame('adofai/index.html')">A Dance of Fire and Ice</button>
  <button class="gameBtn" onclick="startGame('adventurecapital/index.html')">Adventure Capitalist</button>
</div>

<!-- TOP BAR (when in game) -->
<div id="topBar">
  <button id="backBtn" onclick="goBack()">⬅ Back</button>
  <button id="blobBtn" onclick="openBlob()">Open in Blob</button>
</div>

<!-- GAME -->
<iframe id="gameFrame"></iframe>

<script>
let currentGame = "";

function startGame(url) {
  currentGame = url;

  document.getElementById("menu").style.display = "none";
  document.getElementById("topBar").style.display = "block";
  document.getElementById("gameFrame").style.display = "block";
  document.getElementById("gameFrame").src = url;
}

function goBack() {
  document.getElementById("gameFrame").src = "";
  document.getElementById("gameFrame").style.display = "none";
  document.getElementById("topBar").style.display = "none";
  document.getElementById("menu").style.display = "block";
}

async function openBlob() {
  if (!currentGame) return;

  try {
    const res = await fetch(currentGame);
    const text = await res.text();

    const blob = new Blob([text], { type: "text/html" });
    const blobUrl = URL.createObjectURL(blob);

    document.getElementById("gameFrame").src = blobUrl;
  } catch {
    alert("Blob failed");
  }
}
</script>

</body>
</html>
<script>
function startGame(url) {
document.getElementById("gameFrame").src = url;
}
</script>
</script>

<script>

  // hide buttons
  document.getElementById("menu").style.display = "none";

  // show game
  const frame = document.getElementById("gameFrame");
  frame.style.display = "block";
  frame.src = url;
}

function goBack() {
  const frame = document.getElementById("gameFrame");

  // hide game
  frame.style.display = "none";
  frame.src = "";

  // show buttons again
  document.getElementById("menu").style.display = "block";
}
</script>
 

</body>
</html>
