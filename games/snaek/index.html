<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake Game</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" href="favicon.ico" type="image/x-icon">
</head>
<body>
<canvas id="game" width="400" height="400"></canvas>
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const tileSize = 20;
const tileCount = canvas.width / tileSize;

let snake = [{ x: 10, y: 10 }];
let vx = 1, vy = 0;

let food = randomFood();
let score = 0;
let gameOver = false;

document.addEventListener("keydown", e => {
  if (e.key === "ArrowLeft" && vx !== 1)  { vx = -1; vy = 0; }
  if (e.key === "ArrowRight" && vx !== -1){ vx = 1; vy = 0; }
  if (e.key === "ArrowUp" && vy !== 1)    { vx = 0; vy = -1; }
  if (e.key === "ArrowDown" && vy !== -1) { vx = 0; vy = 1; }
});

function randomFood() {
  return {
    x: Math.floor(Math.random() * tileCount),
    y: Math.floor(Math.random() * tileCount)
  };
}

function update() {
  if (gameOver) return;

  const head = { x: snake[0].x + vx, y: snake[0].y + vy };

  // wall collision
  if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount)
    gameOver = true;

  // self collision
  for (let s of snake)
    if (s.x === head.x && s.y === head.y) gameOver = true;

  if (gameOver) {
    draw();
    return;
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score++;
    food = randomFood();
  } else {
    snake.pop();
  }

  draw();
}

function draw() {
  ctx.fillStyle = "#222";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // snake
  snake.forEach((s, i) => {
    ctx.fillStyle = i === 0 ? "#8bc34a" : "#4caf50";
    ctx.fillRect(s.x * tileSize, s.y * tileSize, tileSize - 1, tileSize - 1);
  });

  // food
  ctx.fillStyle = "#ff5722";
  ctx.fillRect(food.x * tileSize, food.y * tileSize, tileSize - 1, tileSize - 1);

  // score
  ctx.fillStyle = "#fff";
  ctx.font = "16px sans-serif";
  ctx.fillText("Score: " + score, 10, 20);

  if (gameOver) {
    ctx.fillStyle = "#f44336";
    ctx.font = "28px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("Game Over", canvas.width / 2, canvas.height / 2);
    ctx.font = "16px sans-serif";
    ctx.fillText("Refresh to play again", canvas.width / 2, canvas.height / 2 + 30);
  }
}

setInterval(update, 100);
</script>

</body>
</html>
