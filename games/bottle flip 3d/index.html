  <script>
    const DESIGN_W = 720, DESIGN_H = 1280;

    var gameInstance = UnityLoader.instantiate(
      "gameContainer",
      "https://cdn.jsdelivr.net/gh/Heyayyu/BottleFlip3D@8e333396655a9fca388cf6b79bc28ff9fba5d707/Build/bottleflip.json",
      {
        onProgress: UnityProgress,
        Module: {
          onRuntimeInitialized: function () {
            UnityProgress(gameInstance, "complete");
            fitGame();
          }
        }
      }
    );

    function getCanvas(){ return document.querySelector('#gameContainer canvas'); }
    function fitGame(){
      const canvas = getCanvas();
      if(!canvas) return;

      const vw = window.innerWidth, vh = window.innerHeight;
      const scale = Math.min(vw / DESIGN_W, vh / DESIGN_H);
      const cssW = Math.round(DESIGN_W * scale);
      const cssH = Math.round(DESIGN_H * scale);

      canvas.style.width  = cssW + 'px';
      canvas.style.height = cssH + 'px';

      const dpr = window.devicePixelRatio || 1;
      try{
        const mod = gameInstance && gameInstance.Module;
        if(mod && typeof mod.setCanvasSize === 'function'){
          mod.setCanvasSize(Math.floor(cssW * dpr), Math.floor(cssH * dpr));
        }else{
          canvas.width  = Math.floor(cssW * dpr);
          canvas.height = Math.floor(cssH * dpr);
        }
      }catch(e){}

      const gc = document.getElementById('gameContainer');
      gc.style.width  = cssW + 'px';
      gc.style.height = cssH + 'px';
    }

    window.addEventListener('resize', fitGame);
    window.addEventListener('orientationchange', fitGame);
    document.addEventListener('fullscreenchange', fitGame);

    new MutationObserver(fitGame).observe(
      document.getElementById('gameContainer'),
      { childList:true }
    );
  </script>
